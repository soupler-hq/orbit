version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # Only auto-update patch versions for major runtime deps
      - dependency-name: "vitest"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    target-branch: "develop"
    labels:
      - "dependencies"
      - "devops"
    commit-message:
      prefix: "chore(actions)"
