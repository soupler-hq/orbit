name: Orbit Main Release

# Triggered when a PR merges into main (i.e. develop → main release PR).
# Runs all quality gates first. If every gate passes and the version in
# package.json has not been released yet, publishes to GitHub Packages and
# creates a GitHub Release automatically — no manual tagging required.

on:
  push:
    branches: [ main ]

jobs:
  # ── Gate 1: Lint & format ────────────────────────────────────────────────
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🔍 ESLint
        run: npm run lint
      - name: 🎨 Prettier format check
        run: npm run format:check
      - name: 🚫 PII scan
        run: |
          if git grep -r "/Users/" -- '*.json' '*.sh' '*.js' '*.ts' \
            ':(exclude).github/workflows/orbit-sentinel.yml' \
            ':(exclude).github/workflows/orbit-main-release.yml'; then
            echo "❌ Hardcoded local paths detected — remove before merging"
            exit 1
          fi

  # ── Gate 2: Unit tests & coverage ────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🧪 Unit Tests
        run: npm test
      - name: 📊 Coverage gate (≥60%)
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  # ── Gate 3: Semantic validation (parallel after lint+test) ───────────────
  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🛡️ Semantic Validation
        run: bash bin/validate.sh
      - name: 📝 Changelog Verification
        run: |
          if ! grep -q "## \[$(cat package.json | jq -r .version)\]" CHANGELOG.md; then
            echo "❌ Version in package.json not documented in CHANGELOG.md"
            exit 1
          fi

  # ── Gate 4: SOTA compliance (parallel after lint+test) ───────────────────
  compliance:
    name: compliance
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🏅 SOTA Compliance Check
        run: bash bin/eval.sh

  # ── Gate 5: Safety & adversarial audit (parallel after lint+test) ────────
  safety:
    name: safety
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🔒 Safety & Adversarial Audit
        run: bash bin/test-safety.sh

  # ── Release: only runs when all 5 gates pass ─────────────────────────────
  release:
    name: release
    runs-on: ubuntu-latest
    needs: [validate, compliance, safety]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need full history to push the tag

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm install

      - name: 🏷️ Resolve version
        id: version
        run: |
          VERSION=$(jq -r .version package.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: 🔍 Check if tag already exists
        id: tag_check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" \
               --verify > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Tag ${{ steps.version.outputs.tag }} already exists — skipping release"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "🚀 New version ${{ steps.version.outputs.tag }} — proceeding with release"
          fi

      - name: 🏷️ Find last published version
        if: steps.tag_check.outputs.exists == 'false'
        id: last_release
        run: |
          # Most recent semver tag that already exists (the previous release).
          # fetch-depth: 0 ensures all tags are available.
          LAST_TAG=$(git tag --sort=-v:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | head -1 || true)
          if [[ -n "$LAST_TAG" ]]; then
            echo "last_version=${LAST_TAG#v}" >> "$GITHUB_OUTPUT"
            echo "Found last release: $LAST_TAG"
          else
            echo "last_version=" >> "$GITHUB_OUTPUT"
            echo "No previous release tag — extracting current version only"
          fi

      - name: 📝 Extract Release Notes
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          if [[ -n "${{ steps.last_release.outputs.last_version }}" ]]; then
            node bin/extract-changelog.js \
              --to ${{ steps.version.outputs.version }} \
              --from ${{ steps.last_release.outputs.last_version }}
          else
            node bin/extract-changelog.js --to ${{ steps.version.outputs.version }}
          fi

      - name: 🔐 Generate SHASUM256 manifest
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          shasum -a 256 \
            CLAUDE.md INSTRUCTIONS.md SKILLS.md WORKFLOWS.md AGENTS.md \
            orbit.registry.json orbit.config.json orbit.config.schema.json \
            install.sh \
            agents/*.md skills/*.md hooks/scripts/*.sh \
            > SHASUM256.txt

      - name: 🏷️ Create and push tag
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push https://x-access-token:${{ secrets.RELEASE_TOKEN }}@github.com/${{ github.repository }} ${{ steps.version.outputs.tag }}

      - name: 🔍 Check if package version already published
        if: steps.tag_check.outputs.exists == 'false'
        id: pkg_check
        run: |
          VERSION=${{ steps.version.outputs.version }}
          if npm view @soupler-hq/orbit@$VERSION version \
               --registry https://npm.pkg.github.com/ 2>/dev/null | grep -q "$VERSION"; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ @soupler-hq/orbit@$VERSION already published — skipping"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 🚀 Publish to GitHub Packages
        if: steps.tag_check.outputs.exists == 'false' && steps.pkg_check.outputs.published == 'false'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📦 Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Orbit ${{ steps.version.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: SHASUM256.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
