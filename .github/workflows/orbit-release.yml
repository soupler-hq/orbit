name: Orbit Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com'

      - name: Install dependencies
        run: npm install

      - name: 🛡️ Pre-Release Validation
        run: bash bin/validate.sh

      - name: 📝 Extract Latest Release Notes
        run: node bin/extract-changelog.js ${{ github.ref_name }}

      - name: 🔐 Generate SHASUM256 manifest
        run: |
          shasum -a 256 \
            CLAUDE.md INSTRUCTIONS.md SKILLS.md WORKFLOWS.md AGENTS.md \
            orbit.registry.json orbit.config.json orbit.config.schema.json \
            install.sh \
            agents/*.md skills/*.md hooks/scripts/*.sh \
            > SHASUM256.txt
          echo "Generated SHASUM256.txt:"
          cat SHASUM256.txt

      - name: 🚀 Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Orbit ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: SHASUM256.txt
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
