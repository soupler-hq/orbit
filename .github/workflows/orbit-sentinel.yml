name: Orbit Sentinel (SOTA Governance)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: 🔍 ESLint
        run: npm run lint
      - name: 🎨 Prettier format check
        run: npm run format:check
      - name: 🚫 PII scan
        run: |
          if git grep -r "/Users/" -- '*.md' '*.json' '*.sh' '*.js' '*.ts' '*.yml'; then
            echo "❌ Hardcoded local paths detected — remove before merging"
            exit 1
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: 🧪 Unit Tests
        run: npm test
      - name: 📊 Coverage gate (≥60%)
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: coverage-report
          path: coverage/

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: 🛡️ Semantic Validation
        run: bash bin/validate.sh
      - name: 📝 Changelog Verification
        run: |
          if ! grep -q "## \[$(cat package.json | jq -r .version)\]" CHANGELOG.md; then
            echo "❌ Version mismatch: Current version in package.json is not documented in CHANGELOG.md"
            exit 1
          fi

  compliance:
    name: compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: 🏅 SOTA Compliance Check
        run: bash bin/eval.sh

  safety:
    name: safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: 🔒 Safety & Adversarial Audit
        run: bash bin/test-safety.sh
