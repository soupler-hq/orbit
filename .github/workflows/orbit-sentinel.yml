name: Orbit Sentinel (SOTA Governance)

on:
  pull_request:
    branches: [ develop, main ]

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🔍 ESLint
        run: npm run lint
      - name: 🎨 Prettier format check
        run: npm run format:check
      - name: 🚫 PII scan
        run: |
          if git grep -r "/Users/" -- '*.json' '*.sh' '*.js' '*.ts' \
            ':(exclude).github/workflows/orbit-sentinel.yml'; then
            echo "❌ Hardcoded local paths detected — remove before merging"
            exit 1
          fi

  test:
    name: test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🧪 Unit Tests
        run: npm test
      - name: 📊 Coverage gate (≥60%)
        run: npm run test:coverage
      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-report
          path: coverage/

  validate:
    name: validate
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🛡️ Semantic Validation
        run: bash bin/validate.sh
      - name: 📝 Changelog Verification
        run: |
          if ! grep -q "## \[$(jq -r .version < package.json)\]" CHANGELOG.md; then
            echo "❌ Version mismatch: Current version in package.json is not documented in CHANGELOG.md"
            exit 1
          fi

  compliance:
    name: compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🏅 SOTA Compliance Check
        run: bash bin/eval.sh

  safety:
    name: safety
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🔒 Safety & Adversarial Audit
        run: bash bin/test-safety.sh

  sca:
    name: sca
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: Install dependencies
        run: npm install
      - name: 🔍 npm audit (high+critical)
        run: npm audit --audit-level=high

  install-test:
    name: install-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: 🔧 install.sh integration tests
        run: bash tests/install.test.sh

  quality:
    name: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
      - name: 📊 Eval runner (routing/workflow/registry/portability ≥80%)
        run: node bin/eval-runner.js --json | tee eval-report.json && node bin/eval-runner.js
      - name: Upload eval report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: eval-report
          path: eval-report.json

  workflow-lint:
    name: workflow-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: 🔍 actionlint (workflow architecture)
        run: |
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          ./actionlint

  publish-dry-run:
    name: publish-dry-run
    runs-on: ubuntu-latest
    needs: [lint, test, validate]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          registry-url: 'https://npm.pkg.github.com/'
      - name: Install dependencies
        run: npm install
      - name: 📦 npm publish --dry-run (validate package is publishable)
        run: npm publish --dry-run
